<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - Digital Minds Inventory Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/select-role.css">
</head>
<body>
    <div class="role-container">
        <!-- Animated Gradient Background with Glass-morphism Effect -->
        <div class="background-gradient">
            <div class="gradient-overlay gradient-overlay-1"></div>
            <div class="gradient-overlay gradient-overlay-2"></div>
        </div>
        
        <!-- Animated Pulsing Orbs -->
        <div class="animated-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <div class="content-wrapper">
            <!-- Logo and Company Info -->
            <div class="header-section">
                <div class="logo-container">
                    <div class="logo-glow"></div>
                    <img 
                        src="https://media.designrush.com/agencies/293509/Digital-Minds.png" 
                        alt="Digital Minds BPO Services Inc." 
                        class="logo-image"
                    />
                </div>
                <h1 class="main-title">Welcome Back</h1>
                <p class="subtitle">Inventory Management System</p>
                <div class="features">
                    <span class="feature">
                        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        Efficient
                    </span>
                    <span class="separator">•</span>
                    <span class="feature">
                        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        Secure
                    </span>
                    <span class="separator">•</span>
                    <span class="feature">
                        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                        </svg>
                        Fast
                    </span>
                </div>
            </div>

            <!-- Role Selection Card -->
            <div class="role-card">
                <div class="role-header">
                    <h2 class="role-title">Select Your Role</h2>
                    <p class="role-subtitle">Choose your department to continue</p>
                </div>
                
                <div class="role-options">
                    <!-- Admin Role -->
                    <button class="role-option" data-role="Admin" onclick="selectRole('Admin')">
                        <div class="role-icon-wrapper">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                        </div>
                        <div class="role-info">
                            <h3 class="role-name">Admin</h3>
                            <p class="role-description">Full system access and management</p>
                        </div>
                        <svg class="role-check hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </button>

                    <!-- IT Officers Role -->
                    <button class="role-option" data-role="IT Officers" onclick="selectRole('IT Officers')">
                        <div class="role-icon-wrapper">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                        </div>
                        <div class="role-info">
                            <h3 class="role-name">IT Officers</h3>
                            <p class="role-description">IT Department inventory management</p>
                        </div>
                        <svg class="role-check hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </button>

                    <!-- HR Officers Role -->
                    <button class="role-option" data-role="HR Officers" onclick="selectRole('HR Officers')">
                        <div class="role-icon-wrapper">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                            </svg>
                        </div>
                        <div class="role-info">
                            <h3 class="role-name">HR Officers</h3>
                            <p class="role-description">HR Department inventory management</p>
                        </div>
                        <svg class="role-check hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="role-actions">
                    <button type="button" class="action-btn action-btn-secondary" onclick="backToLogin()">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        Back
                    </button>
                    <button type="button" class="action-btn action-btn-primary" id="continueBtn" onclick="continueToSystem()" disabled>
                        <span class="btn-text">
                            Continue
                            <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </span>
                        <div class="btn-gradient"></div>
                    </button>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p class="copyright">© 2026 Digital Minds BPO Services Inc. All rights reserved.</p>
                <div class="footer-links">
                    <button class="footer-link">Privacy Policy</button>
                    <span class="footer-separator">•</span>
                    <button class="footer-link">Terms of Service</button>
                    <span class="footer-separator">•</span>
                    <button class="footer-link">Contact Support</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast hidden" id="toast">
        <div class="toast-content">
            <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span class="toast-message" id="toastMessage"></span>
        </div>
    </div>

    <script src="js/select-role.js"></script>
</body>
</html>
